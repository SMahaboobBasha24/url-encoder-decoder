<!DOCTYPE html>
<html>
<head>
<title>URL Encoder Decoder</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:400px;
text-align:center;
}

textarea{
width:100%;
height:120px;
padding:10px;
border:none;
border-radius:6px;
margin-top:10px;
}

button{
margin:10px;
padding:10px 20px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>🌐 URL Encoder / Decoder</h2>

<textarea id="input" placeholder="Enter URL or text"></textarea>

<button onclick="encodeURL()">Encode</button>
<button onclick="decodeURL()">Decode</button>

</div>

<script>

function encodeURL(){

let text = document.getElementById("input").value
document.getElementById("input").value = encodeURIComponent(text)

}

function decodeURL(){

let text = document.getElementById("input").value

try{
document.getElementById("input").value = decodeURIComponent(text)
}
catch{
alert("Invalid encoded URL")
}

}

</script>

</body>
</html>
